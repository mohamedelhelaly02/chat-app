<div class="message-input-container">
  <div class="message-input">
    @if (!isRecording()) {
      <input
        type="text"
        [(ngModel)]="messageText"
        (keypress)="onKeyPress($event)"
        [placeholder]="placeholderText()"
      />
      <div class="input-actions">
        <button class="action-btn" (click)="toggleRecording()">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"
            />
            <path
              d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"
            />
          </svg>
        </button>
      </div>
    } @else {
      <div class="recording-bar-content">
        <button class="send-btn-mini" (click)="stopRecording()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="black">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
          </svg>
        </button>

        <div class="view-once-icon">
          <svg
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="white"
            stroke="white"
            stroke-width="0.5"
          >
            <path
              d="M12 6c1.1 0 2 .9 2 2s-.9 2-2 2-2-.9-2-2 .9-2 2-2m0-4C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"
            />
          </svg>
        </div>

        <button class="pause-btn">
          <div class="pause-bars"></div>
        </button>

        <div class="recording-waveform">
          @for (bar of waveformBars(); track $index) {
            <div class="wave-bar" [style.height.px]="bar"></div>
          }
        </div>

        <span class="timer-text">{{ recordingTime }}</span>

        <div class="red-indicator"></div>

        <button class="delete-btn" (click)="cancelRecording()">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
            <path
              d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"
            />
          </svg>
        </button>
      </div>
    }
  </div>
</div>
